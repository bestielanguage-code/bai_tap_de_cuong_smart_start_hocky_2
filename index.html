      const normalizeText = (text) => {
        if (!text) return "";
        return text
          .toLowerCase()
          .replace(/['".,?!\-]/g, "")
          .replace(/\s+/g, " ")
          .trim();
      };

      const isTextCorrect = (userAns, correctAnswersArray) => {
        const normUser = normalizeText(userAns);
        return correctAnswersArray.some(
          (ans) => normalizeText(ans) === normUser
        );
      };

              } else if (q.type === "text") {
                if (isTextCorrect(answers[q.id], q.ans)) correctCount++;
              }
            });
          }
          return {
            correct: correctCount,
            total: section.questions.length,
            isSubmitted: isSub,
          };
        };

        section,
        userAnswers,

        const handleMcqSelect = (qId, optionIndex) => {
          if (isSub) return;
          setUserAnswers((prev) => ({
            ...prev,

          if (isSub) return;

            ...prev,
            [secId]: { ...(prev[secId] || {}), [qId]: textValue },

          if (isSub) {
            setSubmitted((prev) => ({ ...prev, [secId]: false }));
            return;
          }

          let newCoins = 0;
          let newRewarded = { ...rewardedQs };

          section.questions.forEach((q) => {
            let isCorrect = false;
            if (q.type === "mcq") {
              isCorrect = answers[q.id] === q.ans;
            } else if (q.type === "text") {
              isCorrect = isTextCorrect(answers[q.id], q.ans);

            if (isCorrect && !rewardedQs[q.id]) {
              newCoins += 10;
              newRewarded[q.id] = true;
            }
          });

          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        let correctCount = 0;
        if (isSub) {
          section.questions.forEach((q) => {
            if (q.type === "mcq") {
              if (answers[q.id] === q.ans) correctCount++;

                      {q.type === "mcq" && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">

                            const isSelected = userAnswer === optIdx;
                            const isTrueAns = q.ans === optIdx;

                            let btnClass =
                              "w-full text-left p-3 rounded-xl border-2 font-medium transition-all ";

                            if (isSub) {
                              if (isTrueAns)

                                  "border-green-500 bg-green-100 text-green-800";

                                  "border-red-400 bg-red-100 text-red-800 line-through";
                              else
                                btnClass +=
                                  "border-gray-200 bg-white text-gray-400 opacity-60";

                      )}

                      {isSub && !isCorrect && (
                        <div className="mt-3 text-sm text-red-600 font-semibold bg-red-100/70 p-3 rounded-lg inline-block border border-red-200">
                          Đáp án đúng là: <br />
                          <span className="text-base font-bold text-red-700">
                            {q.type === "mcq" ? q.options[q.ans] : q.ans[0]}
                          </span>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="mt-8 text-center border-t border-gray-100 pt-6">
              <button
                onClick={handleSubmit}
                className={`px-8 py-3 rounded-full font-bold text-lg text-white shadow-lg transition-transform active:scale-95 ${
                  isSub
                    ? "bg-blue-500 hover:bg-blue-600"
                    : "bg-pink-500 hover:bg-pink-600"
                }`}
              >
                {isSub ? "Làm lại phần này" : "Nộp bài & Nhận thưởng"}
              </button>
            </div>
          </div>
        );
      };

      const GachaSystem = ({
        coins,
        setCoins,
        inventory,
        setInventory,
        onBack,
      }) => {
        const [isRolling, setIsRolling] = React.useState(false);
        const [pulledItem, setPulledItem] = React.useState(null);

        const cost = 50;

        const pullGacha = () => {
          if (coins < cost) {
            alert("Bạn không đủ vàng rồi! Hãy làm thêm bài tập nhé!");
            return;
          }

          setCoins((prev) => prev - cost);
          setIsRolling(true);
          setPulledItem(null);

          setTimeout(() => {
            let totalWeight = GACHA_ITEMS.reduce(
              (sum, item) => sum + item.weight,
              0
            );
            let randomNum = Math.random() * totalWeight;

            let selected = GACHA_ITEMS[0];
            for (let item of GACHA_ITEMS) {
              if (randomNum < item.weight) {
                selected = item;
                break;
              }
              randomNum -= item.weight;
            }

            setPulledItem(selected);
            setInventory((prev) => [selected, ...prev]);
            setIsRolling(false);
          }, 1500);
        };

        const getRarityLabel = (rarity) => {
          switch (rarity) {
            case "terrible":
              return "Tệ (Terrible)";
            case "common":
              return "Thường (Common)";
            case "rare":
              return "Hiếm (Rare)";
            case "epic":
              return "Cực hiếm (Epic)";
            case "legendary":
              return "Huyền thoại (Legendary)";
            default:
              return "";
          }
        };

        return (
          <div className="space-y-6">
            <button
              onClick={onBack}
              className="flex items-center gap-1 text-gray-500 hover:text-pink-500 font-semibold transition-colors bg-white px-4 py-2 rounded-full shadow-sm w-max"
            >
              ← Trở về học bài
            </button>

            <div className="bg-white p-8 rounded-3xl shadow-sm border border-pink-100 text-center relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300"></div>

              <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-2 mt-4">
                Hộp Quà May Mắn
              </h2>
              <p className="text-gray-500 font-medium mb-8">
                Mỗi lần mở tốn {cost} vàng. Thử vận may nào!
              </p>

              <div className="mb-8 min-h-[250px] flex flex-col justify-center items-center">
                {isRolling ? (
                  <div className="text-6xl shake">🎁</div>
                ) : pulledItem ? (
                  <div
                    className={`p-6 rounded-2xl border-4 max-w-sm w-full mx-auto animate-bounce shadow-lg item-${pulledItem.rarity}`}
                  >
                    <div className="text-xs font-bold uppercase tracking-wider mb-2 opacity-80">
                      {getRarityLabel(pulledItem.rarity)}
                    </div>
                    <h3 className="text-2xl font-black mb-2">
                      {pulledItem.name}
                    </h3>
                    <p className="opacity-90 font-medium">{pulledItem.desc}</p>
                  </div>
                ) : (
                  <div
                    className="text-8xl opacity-80 hover:scale-110 transition-transform cursor-pointer"
                    onClick={pullGacha}
                  >
                    🎁
                  </div>
                )}
              </div>

              <button
                onClick={pullGacha}
                disabled={isRolling || coins < cost}
                className={`px-8 py-4 rounded-2xl font-black text-xl text-white shadow-xl transition-all ${
                  isRolling || coins < cost
                    ? "bg-gray-300 cursor-not-allowed"
                    : "bg-gradient-to-r from-pink-500 hover:from-pink-400 to-purple-500 hover:to-purple-400 active:scale-95"
                }`}
              >
                Mở hộp quà ({cost} <CoinsIcon />)
              </button>
            </div>

            {/* Inventory */}
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
              <h3 className="font-bold text-xl text-gray-700 mb-4 flex items-center gap-2">
                🎒 Kho đồ của bạn ({inventory.length})
              </h3>
              {inventory.length === 0 ? (
                <p className="text-gray-400 text-center italic py-4">
                  Kho đồ đang trống. Hãy đi học bài kiếm vàng mở quà nhé!
                </p>
              ) : (
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                  {inventory.map((item, idx) => (
                    <div
                      key={idx}
                      className={`p-3 rounded-xl border-2 item-${item.rarity}`}
                    >
                      <div className="text-[10px] font-bold uppercase mb-1 opacity-70">
                        {item.rarity}
                      </div>
                      <div className="font-bold text-sm">{item.name}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
